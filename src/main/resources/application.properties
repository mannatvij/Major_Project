# ===========================
# Server Configuration
# ===========================
server.port=8080

# ===========================
# MongoDB Configuration
# ===========================
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=major_project_db

# ===========================
# JWT Configuration
# ===========================
# IMPORTANT: Replace this with a strong 256-bit secret in production
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# ===========================
# Swagger / OpenAPI
# ===========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ===========================
# Email / SMTP Configuration
# ===========================
# Set MAIL_USERNAME and MAIL_PASSWORD environment variables to enable email.
# Gmail: use an App Password (Google Account → Security → App Passwords).
# Mailtrap (testing): use your Mailtrap SMTP credentials.
# If variables are not set the app still starts — emails are silently skipped.
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=d5c843a7494f35
spring.mail.password=d8fefeabe7b73f
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.test-connection=false

# ===========================
# ML Service (Python) Configuration
# ===========================
# Base URL of the Python Flask healthcare-ml-service (see /healthcare-ml-service)
ml.service.url=http://localhost:5000
# When false, /api/chat always uses the rule-based SymptomMatcher.
ml.service.enabled=true

# ===========================
# Logging
# ===========================
logging.level.org.springframework.security=DEBUG
logging.level.org.example=DEBUG
